<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    /* ── TELA DE LOGIN ─────────────────────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0; z-index: 30;
      background:
        linear-gradient(180deg,
          #87ceeb 0%, #87ceeb 55%,
          #5a9e3c 55%, #5a9e3c 60%,
          #7a5c3a 60%, #7a5c3a 75%,
          #555 75%, #555 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: rgba(10, 10, 10, 0.88);
      border: 3px solid #4a8a4a;
      border-top: 5px solid #5a9e3c;
      border-bottom: 5px solid #3a3a3a;
      border-radius: 4px;
      padding: 36px 44px 40px;
      width: 420px;
      max-width: 95vw;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .login-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.35rem;
      color: #5a9e3c;
      text-shadow: 3px 3px 0 #1a4a1a, -1px -1px 0 #1a4a1a;
      letter-spacing: .05em;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .login-title span { color: #fff; }

    .login-subtitle {
      font-size: .7rem;
      color: #888;
      margin-bottom: 28px;
      letter-spacing: .12em;
    }

    .login-label {
      display: block;
      text-align: left;
      color: #aaa;
      font-size: .72rem;
      margin-bottom: 7px;
      letter-spacing: .08em;
    }

    #nick-input {
      width: 100%;
      padding: 11px 14px;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      background: #111;
      border: 2px solid #444;
      border-radius: 3px;
      color: #eee;
      outline: none;
      transition: border-color .15s;
      letter-spacing: .05em;
    }
    #nick-input:focus  { border-color: #5a9e3c; }
    #nick-input.error  { border-color: #e53935; }
    #nick-input.valid  { border-color: #5a9e3c; }

    #nick-error {
      display: block;
      min-height: 18px;
      margin-top: 6px;
      font-size: .72rem;
      color: #e53935;
      text-align: left;
    }

    #btn-enter {
      margin-top: 22px;
      width: 100%;
      padding: 13px;
      font-family: 'Press Start 2P', monospace;
      font-size: .72rem;
      letter-spacing: .08em;
      background: #4a7a2a;
      border: none;
      border-bottom: 4px solid #2a4a10;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
      transition: background .12s, transform .08s;
    }
    #btn-enter:hover:not(:disabled) { background: #5a9e3c; }
    #btn-enter:active:not(:disabled) { transform: translateY(2px); border-bottom-width: 2px; }
    #btn-enter:disabled { background: #333; border-bottom-color: #222; color: #666; cursor: not-allowed; }
    .login-hint { margin-top: 14px; font-size: .65rem; color: #555; letter-spacing: .06em; }

    /* ── OVERLAY DE PAUSA ──────────────────────────────────────────── */
    /* pointer-events:none → overlay não bloqueia hotbar nem HUD       */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, .52);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #fff;
      z-index: 10;
      pointer-events: none;   /* ← transparente aos cliques */
    }

    /* O card de pausa em si é clicável */
    .pause-card {
      background: rgba(8, 8, 8, 0.92);
      border: 3px solid #4a8a4a;
      border-top: 4px solid #5a9e3c;
      border-bottom: 4px solid #1a3a10;
      border-radius: 4px;
      padding: 28px 48px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: all;    /* ← card é interactivo */
      box-shadow: 0 6px 28px rgba(0,0,0,.7);
    }
    .pause-card h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.1rem;
      color: #5a9e3c;
      text-shadow: 2px 2px 0 #1a4a1a;
    }
    #overlay-msg { font-size: .78rem; opacity: .6; }
    #btn-play {
      padding: 12px 36px;
      font-family: 'Press Start 2P', monospace;
      font-size: .68rem;
      letter-spacing: .08em;
      background: #4a7a2a;
      border: none;
      border-bottom: 4px solid #2a4a10;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
      display: none;
    }
    #btn-play:hover { background: #5a9e3c; }

    /* ── HUD ───────────────────────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      color: #fff;
    }

    /* Crosshair */
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,.9);
    }
    #crosshair::before { width: 2px; height: 22px; left: 50%; top: -11px; }
    #crosshair::after  { width: 22px; height: 2px; top: 50%;  left: -11px; transform: translateY(-50%); }

    /* Barra de progresso de partida de bloco */
    #break-progress {
      position: absolute;
      left: 50%;
      top: calc(50% + 22px);
      transform: translateX(-50%);
      width: 90px;
      height: 7px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    #break-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff8800, #ffcc00);
      border-radius: 2px;
      transition: width 0.04s linear;
    }

    /* Hotbar — pointer-events:all para ser clicável mesmo pausado */
    #hotbar {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 4px;
      z-index: 15;
      pointer-events: all;
    }
    .slot {
      width: 52px; height: 52px;
      border: 2px solid rgba(255,255,255,.35);
      border-radius: 4px;
      background: rgba(0,0,0,.50);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      font-size: 8px; opacity: .82;
      transition: border-color .1s, opacity .1s;
      cursor: pointer;
    }
    .slot:hover   { opacity: 1; border-color: rgba(255,255,255,.6); }
    .slot.active  { border-color: #fff; opacity: 1; border-width: 3px; }
    .slot-swatch  {
      width: 30px; height: 30px;
      border-radius: 3px;
      image-rendering: pixelated;
    }
    .slot-label   { font-size: 7.5px; color: #ddd; text-shadow: 1px 1px 0 #000; }

    /* Info */
    #info {
      position: absolute; top: 8px; left: 8px;
      font-size: 11px; line-height: 1.7;
      text-shadow: 1px 1px 0 #000;
    }

    /* Controls */
    #controls-hint {
      position: absolute; bottom: 86px; right: 10px;
      font-size: 10px; opacity: .42;
      text-align: right; line-height: 1.8;
    }

    /* Nick local */
    #info-nick {
      position: absolute; top: 8px; right: 10px;
      font-size: 11px; opacity: .7;
      text-shadow: 1px 1px 0 #000;
    }
  </style>
</head>
<body>

<!-- ── TELA DE LOGIN ──────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">⛏ MINECRAFT <span>2</span></div>
    <div class="login-subtitle">MUNDO MULTIPLAYER</div>

    <label class="login-label" for="nick-input">O teu nick</label>
    <input
      type="text"
      id="nick-input"
      placeholder="ex: Steve_123"
      maxlength="16"
      autocomplete="off"
      spellcheck="false"
    />
    <span id="nick-error"></span>

    <button id="btn-enter">▶ ENTRAR NO MUNDO</button>
    <p class="login-hint">2–16 caracteres · letras, números e _</p>
  </div>
</div>

<!-- ── OVERLAY DE PAUSA ───────────────────────────────────────────────── -->
<div id="overlay">
  <div class="pause-card">
    <h2>⏸ PAUSADO</h2>
    <p id="overlay-msg">Premiste ESC</p>
    <button id="btn-play">▶ CONTINUAR</button>
  </div>
</div>

<!-- ── HUD ────────────────────────────────────────────────────────────── -->
<div id="hud">
  <div id="crosshair"></div>
  <div id="break-progress"><div id="break-fill"></div></div>

  <div id="hotbar">
    <div class="slot active" data-block="1">
      <div class="slot-swatch" style="background:linear-gradient(180deg,#6db340 30%,#7a5c3a 30%)"></div>
      <span class="slot-label">Relva [1]</span>
    </div>
    <div class="slot" data-block="2">
      <div class="slot-swatch" style="background:#7a5230"></div>
      <span class="slot-label">Terra [2]</span>
    </div>
    <div class="slot" data-block="3">
      <div class="slot-swatch" style="background:#9a9a9a"></div>
      <span class="slot-label">Pedra [3]</span>
    </div>
    <div class="slot" data-block="4">
      <div class="slot-swatch" style="background:repeating-linear-gradient(180deg,#ac7828 0,#ac7828 3px,#6e4818 3px,#6e4818 4px)"></div>
      <span class="slot-label">Madeira [4]</span>
    </div>
    <div class="slot" data-block="5">
      <div class="slot-swatch" style="background:radial-gradient(circle,#7a4a28 30%,#5c3a1a 30%,#5c3a1a 60%,#8c5c36 60%)"></div>
      <span class="slot-label">Tronco [5]</span>
    </div>
  </div>

  <div id="info">
    <div id="info-pos">x:0  y:0  z:0</div>
    <div id="info-players">Jogadores: 1</div>
    <div id="info-fps">FPS: –</div>
  </div>
  <div id="info-nick"></div>

  <div id="controls-hint">
    WASD · mover<br>
    Espaço · saltar<br>
    LMB (segurar) · partir<br>
    RMB · colocar<br>
    1-5 / scroll · bloco<br>
    Esc · pausa
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
